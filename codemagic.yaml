workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 60
    environment:
      flutter: stable
    cache:
      cache_paths:
        - $HOME/.android
    scripts:
      - name: Создать недостающие платформенные папки (android/ios)
        script: |
          flutter create --platforms=android .
      - name: Добавить разрешение на push-уведомления
        script: |
          sed -i '/<uses-permission android:name="android.permission.INTERNET"\/>/a\    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"\/>' android/app/src/main/AndroidManifest.xml
      - name: Установить зависимости
        script: |
          flutter pub get
      - name: Собрать APK (debug)
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
