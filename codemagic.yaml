workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 60
    environment:
      flutter: stable
    cache:
      cache_paths:
        - $HOME/.android
    scripts:
      - name: Создать недостающие платформенные папки (android/ios)
        script: |
          flutter create --platforms=android .
      - name: Установить зависимости
        script: |
          flutter pub get
      - name: Собрать APK (debug)
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
