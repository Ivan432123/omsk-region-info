workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 60
    environment:
      flutter: stable
    cache:
      cache_paths:
        - $HOME/.android
    scripts:
      - name: Создать недостающие платформенные папки (android/ios)
        script: |
          flutter create --platforms=android .
      - name: Добавить разрешение на push-уведомления
        script: |
          python3 << 'PYEOF'
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r', encoding='utf-8') as f:
              content = f.read()
          old = '<uses-permission android:name="android.permission.INTERNET"/>'
          new = old + chr(10) + '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>'
          content = content.replace(old, new, 1)
          with open(path, 'w', encoding='utf-8') as f:
              f.write(content)
          print('Разрешение добавлено')
          PYEOF
      - name: Установить зависимости
        script: |
          flutter pub get
      - name: Собрать APK (debug)
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
# push-уведомления настроены 1784444603
