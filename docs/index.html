<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ОМСКРЕГИОН ИНФО — Админ-панель</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, Roboto, Arial, sans-serif;
            background: #F6F3EC;
            color: #1E2A22;
            margin: 0;
            padding: 16px;
        }

        h1 {
            font-size: 20px;
            margin: 0 0 16px;
        }

        h2 {
            font-size: 16px;
            margin: 24px 0 8px;
            border-top: 1px solid #DEDACD;
            padding-top: 16px;
        }

        .card {
            background: #fff;
            border: 1px solid #DEDACD;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #5A5A4E;
            margin: 10px 0 4px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #DEDACD;
            border-radius: 8px;
            font-size: 15px;
            background: #FAFAF7;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        button {
            background: #1E2A22;
            color: #F6F3EC;
            border: none;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 600;
            margin-top: 12px;
            width: 100%;
        }

        button.secondary {
            background: transparent;
            color: #9C3F2E;
            border: 1px solid #9C3F2E;
        }

        button.danger {
            background: #9C3F2E;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            padding: 10px 0;
            border-bottom: 1px solid #DEDACD;
        }

        .item:last-child {
            border-bottom: none;
        }

        .item-title {
            font-weight: 600;
            font-size: 14px;
        }

        .item-sub {
            font-size: 12px;
            color: #8C8571;
        }

        .item button {
            width: auto;
            margin: 0 0 6px 0;
            padding: 6px 10px;
            font-size: 12px;
            display: block;
        }

        #error-msg {
            color: #9C3F2E;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        #status-msg {
            color: #5F7A5F;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        #admin-screen {
            display: none;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .top-bar button {
            width: auto;
            padding: 8px 14px;
            font-size: 13px;
        }

        #confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(30, 42, 34, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #confirm-overlay.visible {
            display: flex;
        }

        #confirm-box {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            max-width: 320px;
            width: 100%;
        }

        #confirm-message {
            font-size: 15px;
            margin-bottom: 16px;
        }

        #confirm-box .confirm-buttons {
            display: flex;
            gap: 10px;
        }

        #confirm-box button {
            margin-top: 0;
        }

        #alert-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(30, 42, 34, 0.5);
            z-index: 1001;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #alert-overlay.visible {
            display: flex;
        }

        #alert-box {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            max-width: 320px;
            width: 100%;
        }

        #alert-message {
            font-size: 15px;
            margin-bottom: 16px;
            white-space: pre-wrap;
        }

        #alert-box button {
            margin-top: 0;
        }
    </style>
</head>

<body>

    <div id="login-screen">
        <h1>ОМСКРЕГИОН ИНФО — вход</h1>
        <div class="card">
            <label>Email</label>
            <input type="email" id="login-email" autocomplete="username">
            <label>Пароль</label>
            <input type="password" id="login-password" autocomplete="current-password">
            <button onclick="doLogin()">Войти</button>
            <div id="error-msg"></div>
        </div>
    </div>

    <div id="admin-screen">
        <div class="top-bar">
            <h1>Админ-панель</h1>
            <button onclick="doLogout()">Выйти</button>
        </div>

        <div class="card">
            <label>Район</label>
            <select id="district-select" onchange="onDistrictChange()"></select>
        </div>

        <div id="status-msg"></div>

        <h2>Добавить новость</h2>
        <div class="card">
            <label>Заголовок</label>
            <input type="text" id="news-title">
            <label>Краткое описание (для карточки в списке)</label>
            <textarea id="news-description"></textarea>
            <label>Полный текст</label>
            <textarea id="news-content"></textarea>
            <label>Категория</label>
            <select id="news-category">
                <option value="general">Общее</option>
                <option value="water">Водоснабжение</option>
                <option value="gas">Газоснабжение</option>
                <option value="electricity">Электроснабжение</option>
                <option value="road">Дороги</option>
                <option value="emergency">Экстренное</option>
                <option value="events">Мероприятия</option>
            </select>
            <label>Ссылка на изображение (необязательно)</label>
            <input type="text" id="news-image" placeholder="https://...">
            <input type="file" id="news-image-file" accept="image/*" style="margin-top:8px;">
            <button type="button" class="secondary" onclick="uploadNewsImage(this)">Загрузить фото</button>
            <button id="news-submit-btn" onclick="withButtonLock(this, addNews)">Опубликовать новость</button>
        </div>
        <div class="card" id="news-list"></div>

        <h2>Добавить организацию</h2>
        <div class="card">
            <label>Название</label>
            <input type="text" id="org-name">
            <label>Категория</label>
            <input type="text" id="org-category" list="org-category-options" placeholder="МФЦ, Больница, Школа...">
            <datalist id="org-category-options">
                <option value="Госучреждения">
                <option value="Медицина">
                <option value="Образование">
                <option value="Культура">
                <option value="Спорт">
                <option value="Почта">
            </datalist>
            <label>Телефон</label>
            <input type="text" id="org-phone" placeholder="79135551234">
            <label>Адрес</label>
            <input type="text" id="org-address">
            <label>Часы работы</label>
            <input type="text" id="org-hours" placeholder="Пн–Пт: 08:00–17:00">
            <label>Сайт (необязательно)</label>
            <input type="text" id="org-website" placeholder="https://...">
            <label>Описание</label>
            <textarea id="org-description"></textarea>
            <label>Рейтинг (0-5, необязательно)</label>
            <input type="number" id="org-rating" step="0.1" min="0" max="5" placeholder="4.6">
            <label>Количество оценок (необязательно)</label>
            <input type="number" id="org-review-count" min="0" placeholder="12">
            <label>Услуги через запятую (необязательно)</label>
            <input type="text" id="org-services" placeholder="Обращения граждан, Муниципальные услуги, Документы">
            <label>Логотип (необязательно)</label>
            <input type="text" id="org-logo" placeholder="https://...">
            <input type="file" id="org-logo-file" accept="image/*" style="margin-top:8px;">
            <button type="button" class="secondary" onclick="uploadOrgLogo(this)">Загрузить лого</button>
            <label>Фото в галерею (через запятую — уже загруженные ссылки)</label>
            <input type="text" id="org-gallery" placeholder="url1, url2, url3" oninput="updateGalleryCount()">
            <div id="org-gallery-count" style="font-size:12px;color:#8C8571;margin-top:4px;">Фото в галерее: 0</div>
            <input type="file" id="org-gallery-file" accept="image/*" multiple style="margin-top:8px;">
            <button type="button" class="secondary" onclick="uploadOrgGalleryImage(this)">Добавить фото в галерею</button>
            <button id="org-submit-btn" onclick="withButtonLock(this, addOrganization)">Добавить организацию</button>
        </div>
        <div class="card" id="org-list"></div>

        <h2>Добавить вакансию</h2>
        <div class="card">
            <label>Должность</label>
            <input type="text" id="vacancy-title">
            <label>Компания</label>
            <input type="text" id="vacancy-company">
            <label>Описание</label>
            <textarea id="vacancy-description"></textarea>
            <label>Зарплата (необязательно)</label>
            <input type="text" id="vacancy-salary" placeholder="от 40 000 руб.">
            <label>Контактный телефон (необязательно)</label>
            <input type="text" id="vacancy-phone" placeholder="79135551234">
            <button id="vacancy-submit-btn" onclick="withButtonLock(this, addVacancy)">Опубликовать вакансию</button>
        </div>
        <div class="card" id="vacancy-list"></div>

        <h2>Добавить объявление</h2>
        <div class="card">
            <label>Заголовок</label>
            <input type="text" id="announcement-title">
            <label>Текст объявления</label>
            <textarea id="announcement-description"></textarea>
            <label>Контактный телефон (необязательно)</label>
            <input type="text" id="announcement-phone" placeholder="79135551234">
            <label>Фото (через запятую — уже загруженные ссылки, необязательно)</label>
            <input type="text" id="announcement-images" placeholder="url1, url2, url3" oninput="updateAnnouncementImagesCount()">
            <div id="announcement-images-count" style="font-size:12px;color:#8C8571;margin-top:4px;">Фото: 0</div>
            <input type="file" id="announcement-images-file" accept="image/*" multiple style="margin-top:8px;">
            <button type="button" class="secondary" onclick="uploadAnnouncementImages(this)">Загрузить фото</button>
            <button id="announcement-submit-btn" onclick="withButtonLock(this, addAnnouncement)">Опубликовать объявление</button>
        </div>
        <div class="card" id="announcement-list"></div>

        <h2>Добавить событие в афишу</h2>
        <div class="card">
            <label>Название события</label>
            <input type="text" id="event-title">
            <label>Описание</label>
            <textarea id="event-description"></textarea>
            <label>Место проведения (необязательно)</label>
            <input type="text" id="event-location" placeholder="Дом культуры, ул. Ленина 1">
            <label>Дата и время проведения</label>
            <input type="datetime-local" id="event-date">
            <label>Изображение события (необязательно)</label>
            <input type="text" id="event-image" placeholder="https://...">
            <input type="file" id="event-image-file" accept="image/*" style="margin-top:8px;">
            <button type="button" class="secondary" onclick="uploadEventImage(this)">Загрузить фото</button>
            <button id="event-submit-btn" onclick="withButtonLock(this, addEvent)">Опубликовать событие</button>
        </div>
        <div class="card" id="event-list"></div>
    </div>

    <div id="confirm-overlay">
        <div id="confirm-box">
            <div id="confirm-message"></div>
            <div class="confirm-buttons">
                <button class="secondary" onclick="_confirmResolve(false)" style="flex:1;">Отмена</button>
                <button class="danger" onclick="_confirmResolve(true)" style="flex:1;">Удалить</button>
            </div>
        </div>
    </div>

    <div id="alert-overlay">
        <div id="alert-box">
            <div id="alert-message"></div>
            <button onclick="document.getElementById('alert-overlay').classList.remove('visible')">Понятно</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script>

        window.addEventListener('unhandledrejection', function (event) {
            alert('ОШИБКА: ' + (event.reason && event.reason.message ? event.reason.message : event.reason));
        });
        const firebaseConfig = {
            apiKey: "AIzaSyCiUChcrSO8Vt46S84TaPhLRLcqIXAJOPs",
            authDomain: "omsk-region-info.firebaseapp.com",
            projectId: "omsk-region-info",
            storageBucket: "omsk-region-info.firebasestorage.app",
            messagingSenderId: "500185933703",
            appId: "1:500185933703:web:8bc71f35db8377235f1522"
        };
        window.onerror = function (msg, url, line) { alert('ОШИБКА: ' + msg + ' | строка ' + line); return true; };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        window.alert = function (message) {
            document.getElementById('alert-message').textContent = message;
            document.getElementById('alert-overlay').classList.add('visible');
        };

        let currentDistrictId = null;
        let newsCache = {};
        let orgCache = {};
        let vacancyCache = {};
        let announcementCache = {};
        let eventCache = {};
        let editingNewsId = null;
        let editingOrgId = null;
        let editingVacancyId = null;
        let editingAnnouncementId = null;
        let editingEventId = null;

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-screen').style.display = 'block';
                loadDistricts();
            } else {
                document.getElementById('login-screen').style.display = 'block';
                document.getElementById('admin-screen').style.display = 'none';
            }
        });

        function doLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('error-msg');
            errorEl.style.display = 'none';
            auth.signInWithEmailAndPassword(email, password).catch((err) => {
                errorEl.textContent = 'Ошибка входа: неверный email или пароль';
                errorEl.style.display = 'block';
            });
        }

        function doLogout() {
            auth.signOut();
        }

        function showStatus(text) {
            const el = document.getElementById('status-msg');
            el.textContent = text;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        async function loadDistricts() {
            const select = document.getElementById('district-select');
            select.innerHTML = '<option>Загрузка...</option>';
            const snapshot = await db.collection('districts').orderBy('order').get();
            select.innerHTML = '';
            snapshot.forEach((doc) => {
                const opt = document.createElement('option');
                opt.value = doc.id;
                opt.textContent = doc.data().name;
                select.appendChild(opt);
            });
            if (!snapshot.empty) {
                currentDistrictId = snapshot.docs[0].id;
                onDistrictChange();
            }
        }

        function onDistrictChange() {
            currentDistrictId = document.getElementById('district-select').value;
            loadNews();
            loadOrganizations();
            loadVacancies();
            loadAnnouncements();
            loadEvents();
        }

        const PUSH_WORKER_URL = 'https://throbbing-bird-ef82.ivan55rwszzz.workers.dev/';
        const PUSH_TRIGGERING_CATEGORIES = ['water', 'gas', 'electricity', 'emergency'];

        async function sendPushNotification(districtId, title, body, newsId) {
            try {
                const idToken = await auth.currentUser.getIdToken();
                const response = await fetch(PUSH_WORKER_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + idToken
                    },
                    body: JSON.stringify({ districtId, title, body, newsId })
                });
                if (!response.ok) {
                    const text = await response.text();
                    alert('Push НЕ отправлен. Ответ сервера: ' + text);
                    return false;
                }
                return true;
            } catch (err) {
                alert('Push НЕ отправлен (ошибка сети): ' + err.message);
                return false;
            }
        }

        async function addNews() {
            const title = document.getElementById('news-title').value.trim();
            const description = document.getElementById('news-description').value.trim();
            const content = document.getElementById('news-content').value.trim();
            const category = document.getElementById('news-category').value;
            const image = document.getElementById('news-image').value.trim();

            if (!title || !description) {
                alert('Заполните хотя бы заголовок и краткое описание');
                return;
            }

            const isPushTriggering = PUSH_TRIGGERING_CATEGORIES.includes(category);

            if (editingNewsId) {
                await db.collection('news').doc(editingNewsId).update({
                    title, description, content, category,
                    image: image || null
                });
                editingNewsId = null;
                document.getElementById('news-submit-btn').textContent = 'Опубликовать новость';
                showStatus('Новость обновлена');
            } else {
                const docRef = await db.collection('news').add({
                    title, description, content,
                    category,
                    image: image || null,
                    district: currentDistrictId,
                    village: null,
                    sendPush: isPushTriggering,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                if (isPushTriggering) {
                    const pushOk = await sendPushNotification(currentDistrictId, title, description, docRef.id);
                    showStatus(pushOk ? 'Новость опубликована, push отправлен' : 'Новость опубликована, НО push НЕ отправлен');
                } else {
                    showStatus('Новость опубликована');
                }
            }

            document.getElementById('news-title').value = '';
            document.getElementById('news-description').value = '';
            document.getElementById('news-content').value = '';
            document.getElementById('news-image').value = '';
            loadNews();
        }

        async function loadNews() {
            const container = document.getElementById('news-list');
            container.innerHTML = 'Загрузка...';
            const snapshot = await db.collection('news')
                .where('district', '==', currentDistrictId)
                .orderBy('createdAt', 'desc')
                .limit(20)
                .get();

            if (snapshot.empty) {
                container.innerHTML = '<div class="item-sub">Пока нет новостей в этом районе</div>';
                return;
            }

            container.innerHTML = '';
            snapshot.forEach((doc) => {
                const n = doc.data();
                newsCache[doc.id] = n;
                const row = document.createElement('div');
                row.className = 'item';
                row.innerHTML = `
<div>
<div class="item-title">${escapeHtml(n.title)}</div>
<div class="item-sub">${escapeHtml(n.category)}</div>
</div>
<div>
<button class="secondary" onclick="editNews('${doc.id}')">Изменить</button>
<button class="danger" onclick="deleteNews('${doc.id}')">Удалить</button>
</div>
`;
                container.appendChild(row);
            });
        }

        function editNews(id) {
            const n = newsCache[id];
            if (!n) return;
            editingNewsId = id;
            document.getElementById('news-title').value = n.title || '';
            document.getElementById('news-description').value = n.description || '';
            document.getElementById('news-content').value = n.content || '';
            document.getElementById('news-category').value = n.category || 'general';
            document.getElementById('news-image').value = n.image || '';
            document.getElementById('news-submit-btn').textContent = 'Сохранить изменения';
            document.getElementById('news-title').scrollIntoView({ behavior: 'smooth' });
        }

        async function deleteNews(id) {
            if (!(await showConfirmDialog('Удалить эту новость?'))) return;
            await db.collection('news').doc(id).delete();
            loadNews();
        }

        async function addOrganization() {
            const name = document.getElementById('org-name').value.trim();
            const category = document.getElementById('org-category').value.trim();
            const phone = document.getElementById('org-phone').value.trim();
            const address = document.getElementById('org-address').value.trim();
            const workingHours = document.getElementById('org-hours').value.trim();
            const website = document.getElementById('org-website').value.trim();
            const description = document.getElementById('org-description').value.trim();
            const ratingRaw = document.getElementById('org-rating').value.trim();
            const reviewCountRaw = document.getElementById('org-review-count').value.trim();
            const servicesRaw = document.getElementById('org-services').value.trim();
            const logoUrl = document.getElementById('org-logo').value.trim() || null;
            const galleryRaw = document.getElementById('org-gallery').value.trim();
            const rating = ratingRaw ? parseFloat(ratingRaw) : null;
            const reviewCount = reviewCountRaw ? parseInt(reviewCountRaw, 10) : null;
            const services = servicesRaw
                ? servicesRaw.split(',').map((s) => s.trim()).filter(Boolean)
                : [];
            const gallery = galleryRaw
                ? galleryRaw.split(',').map((s) => s.trim()).filter(Boolean)
                : [];

            if (!name || !phone) {
                alert('Заполните хотя бы название и телефон');
                return;
            }

            if (editingOrgId) {
                await db.collection('organizations').doc(editingOrgId).update({
                    name, category, phone, address, workingHours,
                    website: website || null,
                    description,
                    rating, reviewCount, services,
                    logoUrl, gallery
                });
                editingOrgId = null;
                document.getElementById('org-submit-btn').textContent = 'Добавить организацию';
                showStatus('Организация обновлена');
            } else {
                await db.collection('organizations').add({
                    name, category, phone, address, workingHours,
                    website: website || null,
                    description,
                    rating, reviewCount, services,
                    logoUrl, gallery,
                    district: currentDistrictId
                });
                showStatus('Организация добавлена');
            }

            document.getElementById('org-name').value = '';
            document.getElementById('org-category').value = '';
            document.getElementById('org-phone').value = '';
            document.getElementById('org-address').value = '';
            document.getElementById('org-hours').value = '';
            document.getElementById('org-website').value = '';
            document.getElementById('org-description').value = '';
            document.getElementById('org-rating').value = '';
            document.getElementById('org-review-count').value = '';
            document.getElementById('org-services').value = '';
            document.getElementById('org-logo').value = '';
            document.getElementById('org-gallery').value = '';
            updateGalleryCount();
            loadOrganizations();
        }

        async function loadOrganizations() {
            const container = document.getElementById('org-list');
            container.innerHTML = 'Загрузка...';
            const snapshot = await db.collection('organizations')
                .where('district', '==', currentDistrictId)
                .orderBy('name')
                .get();

            if (snapshot.empty) {
                container.innerHTML = '<div class="item-sub">Пока нет организаций в этом районе</div>';
                return;
            }

            container.innerHTML = '';
            snapshot.forEach((doc) => {
                const o = doc.data();
                orgCache[doc.id] = o;
                const row = document.createElement('div');
                row.className = 'item';
                row.innerHTML = `
<div>

        async function addEvent() {
            const title = document.getElementById('event-title').value.trim();
            const description = document.getElementById('event-description').value.trim();
            const location = document.getElementById('event-location').value.trim();
            const eventDateValue = document.getElementById('event-date').value;

            if (!title || !eventDateValue) {
                alert('Заполните хотя бы название и дату события');
                return;
            }

            const eventDate = firebase.firestore.Timestamp.fromDate(new Date(eventDateValue));

            if (editingEventId) {
                await db.collection('events').doc(editingEventId).update({
                    title, description,
                    location: location || null,
                    image,
                    eventDate
                });
                editingEventId = null;
                document.getElementById('event-submit-btn').textContent = 'Опубликовать событие';
                showStatus('Событие обновлено');
            } else {
                await db.collection('events').add({
                    title, description,
                    location: location || null,
                    image,
                    eventDate,
                    district: currentDistrictId,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showStatus('Событие опубликовано');
            }

            document.getElementById('event-title').value = '';
            document.getElementById('event-description').value = '';
            document.getElementById('event-location').value = '';
            document.getElementById('event-date').value = '';
            document.getElementById('event-image').value = '';
            loadEvents();
        }

        async function loadEvents() {
            const container = document.getElementById('event-list');
            container.innerHTML = 'Загрузка...';
            const snapshot = await db.collection('events')
                .where('district', '==', currentDistrictId)
                .orderBy('eventDate', 'asc')
                .limit(20)
                .get();

            if (snapshot.empty) {
                container.innerHTML = '<div class="item-sub">Пока нет событий в этом районе</div>';
                return;
            }

            container.innerHTML = '';
            snapshot.forEach((doc) => {
                const e = doc.data();
                eventCache[doc.id] = e;
                const dateStr = e.eventDate && e.eventDate.toDate
                    ? e.eventDate.toDate().toLocaleString('ru-RU')
                    : '';
                const row = document.createElement('div');
                row.className = 'item';
                row.innerHTML = `
<div>
<div class="item-title">${escapeHtml(e.title)}</div>
<div class="item-sub">${escapeHtml(dateStr)}</div>
</div>
<div>
<button class="secondary" onclick="editEvent('${doc.id}')">Изменить</button>
<button class="danger" onclick="deleteEvent('${doc.id}')">Удалить</button>
</div>
`;
                container.appendChild(row);
            });
        }

        function editEvent(id) {
            const e = eventCache[id];
            if (!e) return;
            editingEventId = id;
            document.getElementById('event-title').value = e.title || '';
            document.getElementById('event-description').value = e.description || '';
            document.getElementById('event-location').value = e.location || '';
            document.getElementById('event-image').value = e.image || '';
            if (e.eventDate && e.eventDate.toDate) {
                const d = e.eventDate.toDate();
                const pad = (n) => String(n).padStart(2, '0');
                const localValue = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
                document.getElementById('event-date').value = localValue;
            }
            document.getElementById('event-submit-btn').textContent = 'Сохранить изменения';
            document.getElementById('event-title').scrollIntoView({ behavior: 'smooth' });
        }

        async function deleteEvent(id) {
            if (!(await showConfirmDialog('Удалить это событие?'))) return;
            await db.collection('events').doc(id).delete();
            loadEvents();
        }

        let _confirmResolve = null;

        function showConfirmDialog(message) {
            return new Promise((resolve) => {
                document.getElementById('confirm-message').textContent = message;
                document.getElementById('confirm-overlay').classList.add('visible');
                _confirmResolve = (result) => {
                    document.getElementById('confirm-overlay').classList.remove('visible');
                    _confirmResolve = null;
                    resolve(result);
                };
            });
        }

        async function withButtonLock(btn, fn) {
            if (btn.disabled) return;
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Сохранение...';
            try {
                await fn();
            } finally {
                btn.disabled = false;
                if (btn.textContent === 'Сохранение...') {
                    btn.textContent = originalText;
                }
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }
