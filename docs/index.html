<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ОМСКРЕГИОН ИНФО — Админ-панель</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            /* На iOS Safari поле ввода с font-size меньше 16px при фокусе
               заставляет всю страницу автоматически зумиться — после этого
               вёрстка выглядит "съехавшей", пока не зумить обратно вручную.
               -webkit-text-size-adjust дополнительно отключает случайное
               укрупнение текста при повороте экрана. */
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: -apple-system, Roboto, Arial, sans-serif;
            background: #F6F3EC;
            color: #1E2A22;
            margin: 0;
            padding: 16px;
            overflow-x: hidden;
        }

        h1 {
            font-size: 20px;
            margin: 0 0 16px;
        }

        h2 {
            font-size: 16px;
            margin: 24px 0 8px;
            border-top: 1px solid #DEDACD;
            padding-top: 16px;
        }

        .card {
            background: #fff;
            border: 1px solid #DEDACD;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #5A5A4E;
            margin: 10px 0 4px;
        }

        input,
        select,
        textarea {
            /* Ровно 16px, не меньше — иначе iOS Safari зумит страницу при
               фокусе на поле (см. комментарий у html{} выше). */
            width: 100%;
            max-width: 100%;
            padding: 10px;
            border: 1px solid #DEDACD;
            border-radius: 8px;
            font-size: 16px;
            background: #FAFAF7;
        }

        /* Чекбоксы — не текстовые поля, общий стиль input их ломает
           (растягивает на всю ширину, добавляет паддинг/рамку/фон). */
        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            padding: 0;
            border: none;
            border-radius: 0;
            background: none;
            flex-shrink: 0;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        button {
            background: #1E2A22;
            color: #F6F3EC;
            border: none;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 600;
            margin-top: 12px;
            width: 100%;
        }

        button.secondary {
            background: transparent;
            color: #9C3F2E;
            border: 1px solid #9C3F2E;
        }

        button.danger {
            background: #9C3F2E;
        }

        .item {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            padding: 10px 0;
            border-bottom: 1px solid #DEDACD;
        }

        .item:last-child {
            border-bottom: none;
        }

        /* Первый блок (заголовок+подпись) — тянется и переносит слова,
           второй (кнопки) — не сжимается. Без этого длинный заголовок или
           случайно вставленная ссылка выталкивают кнопки за край экрана
           на узких мобильных вёрстка "разъезжается". */
        .item>div:first-child {
            flex: 1 1 180px;
            min-width: 0;
        }

        .item>div:last-child {
            flex-shrink: 0;
        }

        .item-title {
            font-weight: 600;
            font-size: 14px;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .item-sub {
            font-size: 12px;
            color: #8C8571;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .item button {
            width: auto;
            margin: 0 0 6px 0;
            padding: 6px 10px;
            font-size: 12px;
            display: block;
        }

        #error-msg {
            color: #9C3F2E;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        #status-msg {
            color: #5F7A5F;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        #admin-screen {
            display: none;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        /* h1 внутри .top-bar по умолчанию несёт нижний отступ (h1{margin:0 0
           16px}), а кнопка — верхний (наследуется от общего button{margin-top:
           12px}). Разные margin-боксы у соседей внутри align-items:center
           сдвигают их видимое содержимое друг относительно друга — заголовок
           и кнопка "Выйти" выглядели не выровненными по вертикали. */
        .top-bar h1 {
            margin: 0;
            min-width: 0;
            overflow-wrap: break-word;
        }

        .top-bar button {
            width: auto;
            flex-shrink: 0;
            margin-top: 0;
            padding: 8px 14px;
            font-size: 13px;
        }

        #confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(30, 42, 34, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #confirm-overlay.visible {
            display: flex;
        }

        #confirm-box {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            max-width: 320px;
            width: 100%;
        }

        #confirm-message {
            font-size: 15px;
            margin-bottom: 16px;
        }

        #confirm-box .confirm-buttons {
            display: flex;
            gap: 10px;
        }

        #confirm-box button {
            margin-top: 0;
        }

        #alert-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(30, 42, 34, 0.5);
            z-index: 1001;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #alert-overlay.visible {
            display: flex;
        }

        #alert-box {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            max-width: 320px;
            width: 100%;
        }

        #alert-message {
            font-size: 15px;
            margin-bottom: 16px;
            white-space: pre-wrap;
        }

        #alert-box button {
            margin-top: 0;
        }
    </style>
</head>

<body>

    <div id="login-screen">
        <h1>ОМСКРЕГИОН ИНФО — вход</h1>
        <div class="card">
            <label>Email</label>
            <input type="email" id="login-email" autocomplete="username">
            <label>Пароль</label>
            <input type="password" id="login-password" autocomplete="current-password">
            <button onclick="doLogin()">Войти</button>
            <div id="error-msg"></div>
        </div>
    </div>

    <div id="admin-screen">
        <div class="top-bar">
            <h1>Админ-панель</h1>
            <button onclick="doLogout()">Выйти</button>
        </div>

        <div class="card">
            <label>Район</label>
            <select id="district-select" onchange="onDistrictChange()"></select>
        </div>

        <div id="status-msg"></div>

        <h2>Добавить новость</h2>
        <div class="card">
            <label>Заголовок</label>
            <input type="text" id="news-title">
            <label>Краткое описание (для карточки в списке)</label>
            <textarea id="news-description"></textarea>
            <label>Полный текст</label>
            <textarea id="news-content"></textarea>
            <label>Категория</label>
            <select id="news-category">
                <option value="general">Общее</option>
                <option value="water">Водоснабжение</option>
                <option value="gas">Газоснабжение</option>
                <option value="electricity">Электроснабжение</option>
                <option value="road">Дороги</option>
                <option value="emergency">Экстренное</option>
                <option value="events">Мероприятия</option>
            </select>
            <label>Ссылка на изображение (необязательно)</label>
            <input type="text" id="news-image" placeholder="https://...">
            <input type="file" id="news-image-file" accept="image/*" style="margin-top:8px;">
            <button type="button" class="secondary" onclick="uploadNewsImage(this)">Загрузить фото</button>
            <button id="news-submit-btn" onclick="withButtonLock(this, addNews)">Опубликовать новость</button>
        </div>
        <div class="card" id="news-list"></div>

        <h2>Добавить организацию</h2>
        <div class="card">
            <label>Название</label>
            <input type="text" id="org-name">
            <label>Категория</label>
            <input type="text" id="org-category" list="org-category-options" placeholder="МФЦ, Больница, Школа...">
            <datalist id="org-category-options">
                <option value="Госучреждения">
                <option value="Медицина">
                <option value="Образование">
                <option value="Культура">
                <option value="Спорт">
                <option value="Почта">
            </datalist>
            <label>Телефон</label>
            <input type="text" id="org-phone" placeholder="79135551234">
            <label>Адрес</label>
            <input type="text" id="org-address">
            <label>Часы работы</label>
            <input type="text" id="org-hours" placeholder="Пн–Пт: 08:00–17:00">
            <label>Сайт (необязательно)</label>
            <input type="text" id="org-website" placeholder="https://...">
            <label>Описание</label>
            <textarea id="org-description"></textarea>
            <label>Рейтинг (0-5, необязательно)</label>
            <input type="number" id="org-rating" step="0.1" min="0" max="5" placeholder="4.6">
            <label>Количество оценок (необязательно)</label>
            <input type="number" id="org-review-count" min="0" placeholder="12">
            <label>Услуги через запятую (необязательно)</label>
            <input type="text" id="org-services" placeholder="Обращения граждан, Муниципальные услуги, Документы">
            <label>Логотип (необязательно)</label>
            <input type="text" id="org-logo" placeholder="https://...">
            <input type="file" id="org-logo-file" accept="image/*" style="margin-top:8px;">
            <button type="button" class="secondary" onclick="uploadOrgLogo(this)">Загрузить лого</button>
            <label>Фото в галерею (через запятую — уже загруженные ссылки)</label>
            <input type="text" id="org-gallery" placeholder="url1, url2, url3" oninput="updateGalleryCount()">
            <div id="org-gallery-count" style="font-size:12px;color:#8C8571;margin-top:4px;">Фото в галерее: 0</div>
            <input type="file" id="org-gallery-file" accept="image/*" multiple style="margin-top:8px;">
            <button type="button" class="secondary" onclick="uploadOrgGalleryImage(this)">Добавить фото в галерею</button>
            <button id="org-submit-btn" onclick="withButtonLock(this, addOrganization)">Добавить организацию</button>
        </div>
        <div class="card" id="org-list"></div>

        <h2>Добавить вакансию</h2>
        <div class="card">
            <label>Должность</label>
            <input type="text" id="vacancy-title">
            <label>Компания</label>
            <input type="text" id="vacancy-company">
            <label>Описание</label>
            <textarea id="vacancy-description"></textarea>
            <label>Зарплата (необязательно)</label>
            <input type="text" id="vacancy-salary" placeholder="от 40 000 руб.">
            <label>Контактный телефон (необязательно)</label>
            <input type="text" id="vacancy-phone" placeholder="79135551234">
            <button id="vacancy-submit-btn" onclick="withButtonLock(this, addVacancy)">Опубликовать вакансию</button>
        </div>
        <div class="card" id="vacancy-list"></div>

        <h2>Добавить объявление</h2>
        <div class="card">
            <label>Заголовок</label>
            <input type="text" id="announcement-title">
            <label>Текст объявления</label>
            <textarea id="announcement-description"></textarea>
            <label>Контактный телефон (необязательно)</label>
            <input type="text" id="announcement-phone" placeholder="79135551234">
            <label>Фото (через запятую — уже загруженные ссылки, необязательно)</label>
            <input type="text" id="announcement-images" placeholder="url1, url2, url3" oninput="updateAnnouncementImagesCount()">
            <div id="announcement-images-count" style="font-size:12px;color:#8C8571;margin-top:4px;">Фото: 0</div>
            <input type="file" id="announcement-images-file" accept="image/*" multiple style="margin-top:8px;">
            <button type="button" class="secondary" onclick="uploadAnnouncementImages(this)">Загрузить фото</button>
            <button id="announcement-submit-btn" onclick="withButtonLock(this, addAnnouncement)">Опубликовать объявление</button>
        </div>
        <div class="card" id="announcement-list"></div>

        <div id="ad-requests-section" style="display:none;">
        <h2>Заявки на объявления от жителей</h2>
        <div class="card" id="ad-requests-list"></div>
        </div>

        <h2>Добавить событие в афишу</h2>
        <div class="card">
            <label>Название события</label>
            <input type="text" id="event-title">
            <label>Описание</label>
            <textarea id="event-description"></textarea>
            <label>Место проведения (необязательно)</label>
            <input type="text" id="event-location" placeholder="Дом культуры, ул. Ленина 1">
            <label>Дата и время проведения</label>
            <input type="datetime-local" id="event-date">
            <label>Изображение события (необязательно)</label>
            <input type="text" id="event-image" placeholder="https://...">
            <input type="file" id="event-image-file" accept="image/*" style="margin-top:8px;">
            <button type="button" class="secondary" onclick="uploadEventImage(this)">Загрузить фото</button>
            <button id="event-submit-btn" onclick="withButtonLock(this, addEvent)">Опубликовать событие</button>
        </div>
        <div class="card" id="event-list"></div>

        <h2>Добавить рекламный баннер</h2>
        <div class="card">
            <label>Заголовок (виден на баннере)</label>
            <input type="text" id="sponsored-title">
            <label>Ссылка на изображение</label>
            <input type="text" id="sponsored-image" placeholder="https://...">
            <input type="file" id="sponsored-image-file" accept="image/*" style="margin-top:8px;">
            <button type="button" class="secondary" onclick="uploadSponsoredImage(this)">Загрузить фото</button>
            <label>Ссылка перехода (куда ведёт баннер)</label>
            <input type="text" id="sponsored-url" placeholder="https://...">
            <label>ID организации (необязательно, если баннер организации из каталога)</label>
            <input type="text" id="sponsored-org-id">
            <label>Активно до</label>
            <input type="datetime-local" id="sponsored-active-until">
            <label>Порядок показа (меньше — выше в ленте)</label>
            <input type="number" id="sponsored-order" value="0">
            <label style="display:flex;align-items:center;gap:8px;margin-top:14px;">
                <input type="checkbox" id="sponsored-all-districts">
                Показывать во всех районах (а не только в выбранном)
            </label>
            <button id="sponsored-submit-btn" onclick="withButtonLock(this, addSponsored)">Опубликовать баннер</button>
        </div>
        <div class="card" id="sponsored-list"></div>

        <div id="banner-requests-section" style="display:none;">
        <h2>Заявки на баннеры от рекламодателей</h2>
        <div class="card" id="banner-requests-list"></div>
        </div>

        <h2>Добавить автобусный маршрут</h2>
        <div class="card">
            <label>Номер маршрута</label>
            <input type="text" id="bus-number" placeholder="101">
            <label>Название маршрута</label>
            <input type="text" id="bus-name" placeholder="Автовокзал — Нефтяники">
            <label>Остановки через запятую</label>
            <input type="text" id="bus-stops" placeholder="Автовокзал, ул. Ленина, Нефтяники">
            <label>Время отправления через запятую</label>
            <input type="text" id="bus-times" placeholder="07:00, 08:30, 10:00">
            <label>Примечание (необязательно)</label>
            <textarea id="bus-notes" placeholder="По выходным не ходит"></textarea>
            <label>Порядок показа (меньше — выше в списке)</label>
            <input type="number" id="bus-order" value="0">
            <button id="bus-submit-btn" onclick="withButtonLock(this, addBusRoute)">Опубликовать маршрут</button>
        </div>
        <div class="card" id="bus-list"></div>
    </div>

    <div id="confirm-overlay">
        <div id="confirm-box">
            <div id="confirm-message"></div>
            <div class="confirm-buttons">
                <button class="secondary" onclick="_confirmResolve(false)" style="flex:1;">Отмена</button>
                <button class="danger" id="confirm-confirm-btn" onclick="_confirmResolve(true)" style="flex:1;">Удалить</button>
            </div>
        </div>
    </div>

    <div id="alert-overlay">
        <div id="alert-box">
            <div id="alert-message"></div>
            <button onclick="document.getElementById('alert-overlay').classList.remove('visible')">Понятно</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script>

        window.addEventListener('unhandledrejection', function (event) {
            alert('ОШИБКА: ' + (event.reason && event.reason.message ? event.reason.message : event.reason));
        });
        const firebaseConfig = {
            apiKey: "AIzaSyCiUChcrSO8Vt46S84TaPhLRLcqIXAJOPs",
            authDomain: "omsk-region-info.firebaseapp.com",
            projectId: "omsk-region-info",
            storageBucket: "omsk-region-info.firebasestorage.app",
            messagingSenderId: "500185933703",
            appId: "1:500185933703:web:8bc71f35db8377235f1522"
        };
        window.onerror = function (msg, url, line) { alert('ОШИБКА: ' + msg + ' | строка ' + line); return true; };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        window.alert = function (message) {
            document.getElementById('alert-message').textContent = message;
            document.getElementById('alert-overlay').classList.add('visible');
        };

        let currentDistrictId = null;
        let newsCache = {};
        let orgCache = {};
        let vacancyCache = {};
        let announcementCache = {};
        let eventCache = {};
        let sponsoredCache = {};
        let busRouteCache = {};
        let editingNewsId = null;
        let editingOrgId = null;
        let editingVacancyId = null;
        let editingAnnouncementId = null;
        let editingEventId = null;
        let editingSponsoredId = null;
        let editingBusRouteId = null;

        const SUPER_ADMIN_EMAIL = 'ivansurmanov@yandex.ru';

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-screen').style.display = 'block';
                document.getElementById('ad-requests-section').style.display =
                    (user.email === SUPER_ADMIN_EMAIL) ? 'block' : 'none';
                document.getElementById('banner-requests-section').style.display =
                    (user.email === SUPER_ADMIN_EMAIL) ? 'block' : 'none';
                loadDistricts();
            } else {
                document.getElementById('login-screen').style.display = 'block';
                document.getElementById('admin-screen').style.display = 'none';
            }
        });

        function doLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('error-msg');
            errorEl.style.display = 'none';
            auth.signInWithEmailAndPassword(email, password).catch((err) => {
                errorEl.textContent = 'Ошибка входа: неверный email или пароль';
                errorEl.style.display = 'block';
            });
        }

        function doLogout() {
            auth.signOut();
        }

        function showStatus(text) {
            const el = document.getElementById('status-msg');
            el.textContent = text;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        // Показывает ошибку загрузки прямо в блоке списка вместо того, чтобы
        // оставлять его навсегда с текстом "Загрузка..." — раньше при любой
        // ошибке Firestore (запрет по правилам, отсутствующий индекс, обрыв
        // сети) список зависал молча, и только глобальный alert() с сырым
        // текстом ошибки давал знать, что что-то не так.
        function renderLoadError(container, message, retryFn) {
            container.innerHTML = '';
            const msgEl = document.createElement('div');
            msgEl.className = 'item-sub';
            msgEl.style.color = '#9C3F2E';
            msgEl.textContent = message;
            container.appendChild(msgEl);
            if (retryFn) {
                const btn = document.createElement('button');
                btn.className = 'secondary';
                btn.style.width = 'auto';
                btn.style.marginTop = '8px';
                btn.textContent = 'Повторить';
                btn.onclick = retryFn;
                container.appendChild(btn);
            }
        }

        async function loadDistricts() {
            const select = document.getElementById('district-select');
            select.innerHTML = '<option>Загрузка...</option>';
            try {
                const snapshot = await db.collection('districts').orderBy('order').get();
                select.innerHTML = '';
                snapshot.forEach((doc) => {
                    const opt = document.createElement('option');
                    opt.value = doc.id;
                    opt.textContent = doc.data().name;
                    select.appendChild(opt);
                });
                if (!snapshot.empty) {
                    currentDistrictId = snapshot.docs[0].id;
                    onDistrictChange();
                }
            } catch (err) {
                select.innerHTML = '<option>Ошибка загрузки районов</option>';
                alert('Не удалось загрузить список районов: ' + err.message);
            }
        }

        let adRequestCache = {};

        async function loadAdRequests() {
            if (!auth.currentUser || auth.currentUser.email !== SUPER_ADMIN_EMAIL) return;
            const container = document.getElementById('ad-requests-list');

        const PUSH_WORKER_URL = 'https://throbbing-bird-ef82.ivan55rwszzz.workers.dev/';
        const PUSH_TRIGGERING_CATEGORIES = ['water', 'gas', 'electricity', 'emergency'];

        async function sendPushNotification(districtId, title, body, newsId, type) {
            try {
                const idToken = await auth.currentUser.getIdToken();
                const response = await fetch(PUSH_WORKER_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + idToken
                    },
                    body: JSON.stringify({ districtId, title, body, newsId, type: type || 'news' })
                });
                if (!response.ok) {
                    const text = await response.text();
                    alert('Push НЕ отправлен. Ответ сервера: ' + text);
                    return false;
                }
                return true;
            } catch (err) {
                alert('Push НЕ отправлен (ошибка сети): ' + err.message);
                return false;
            }
        }

        async function uploadOrgGalleryImage(btn) {
            const fileInput = document.getElementById('org-gallery-file');
            const files = Array.from(fileInput.files || []);
            if (files.length === 0) {
                alert('Сначала выберите файл (можно сразу несколько)');
                return;
            }
            const originalText = btn ? btn.textContent : null;
            if (btn) { btn.disabled = true; }
            const field = document.getElementById('org-gallery');
            let uploaded = 0;
            let failed = 0;
            for (let i = 0; i < files.length; i++) {
                if (btn) { btn.textContent = `Загрузка ${i + 1} из ${files.length}...`; }
                try {
                    const formData = new FormData();
                    formData.append('file', files[i]);
                    formData.append('upload_preset', 'my_preset');
                    const response = await fetch('https://api.cloudinary.com/v1_1/agidf3gy/image/upload', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    if (data.secure_url) {
                        field.value = field.value.trim()
                            ? field.value.trim() + ', ' + data.secure_url
                            : data.secure_url;
                        updateGalleryCount();
                        uploaded++;
                    } else {
                        failed++;
                    }
                } catch (err) {
                    failed++;
                }
            }
            if (failed === 0) {
                showStatus(`Загружено фото: ${uploaded}`);
                if (btn) btn.textContent = `✓ Загружено: ${uploaded}`;
            } else {
                alert(`Загружено: ${uploaded}, не удалось: ${failed}`);
                if (btn) btn.textContent = originalText;
            }
            fileInput.value = '';
            if (btn) {
                setTimeout(() => { btn.disabled = false; btn.textContent = originalText; }, 2000);
            }
        }

        // ---------- Рекламные баннеры (sponsored_content) ----------

        async function addSponsored() {
            const title = document.getElementById('sponsored-title').value.trim();
            const imageUrl = document.getElementById('sponsored-image').value.trim();
            const targetUrl = document.getElementById('sponsored-url').value.trim();
            const organizationId = document.getElementById('sponsored-org-id').value.trim();
            const activeUntilValue = document.getElementById('sponsored-active-until').value;
            const order = parseInt(document.getElementById('sponsored-order').value, 10) || 0;
            const allDistricts = document.getElementById('sponsored-all-districts').checked;
            // 'all' — зарезервированное значение district, означающее "показывать
            // в ленте каждого района", а не конкретный id района (см.
            // SponsoredContentRepository.getActiveSponsoredContent во Flutter-коде
            // и loadSponsored ниже — оба запрашивают district in [текущий, 'all']).
            const district = allDistricts ? 'all' : currentDistrictId;

            if (!title || !imageUrl || !targetUrl || !activeUntilValue) {
                alert('Заполните заголовок, изображение, ссылку перехода и срок действия');
                return;
            }

            const activeUntil = firebase.firestore.Timestamp.fromDate(new Date(activeUntilValue));

            if (editingSponsoredId) {
                await db.collection('sponsored_content').doc(editingSponsoredId).update({
                    title, imageUrl, targetUrl,
                    organizationId: organizationId || null,
                    activeUntil, order, district
                });
                editingSponsoredId = null;
                document.getElementById('sponsored-submit-btn').textContent = 'Опубликовать баннер';
                showStatus('Баннер обновлён');
            } else {
                await db.collection('sponsored_content').add({
                    title, imageUrl, targetUrl,
                    organizationId: organizationId || null,
                    activeUntil, order, district,
                    clickCount: 0
                });
                showStatus('Баннер опубликован');
            }

            document.getElementById('sponsored-title').value = '';
            document.getElementById('sponsored-image').value = '';
            document.getElementById('sponsored-url').value = '';
            document.getElementById('sponsored-org-id').value = '';
            document.getElementById('sponsored-active-until').value = '';
            document.getElementById('sponsored-order').value = '0';
            document.getElementById('sponsored-all-districts').checked = false;
            loadSponsored();
        }

        async function loadSponsored() {
            const container = document.getElementById('sponsored-list');
            container.innerHTML = 'Загрузка...';
            try {
                // orderBy по возрастанию activeUntil — совпадает с направлением
                // составного индекса (district+activeUntil), которым уже
                // пользуется приложение; отдельный индекс на убывание не нужен.
                // district in [текущий район, 'all'] — 'in' использует тот же
                // индекс, что и обычное равенство, поэтому отдельный индекс не
                // нужен: баннеры "на все районы" подмешиваются в общий список.
                const snapshot = await db.collection('sponsored_content')
                    .where('district', 'in', [currentDistrictId, 'all'])
                    .orderBy('activeUntil')
                    .get();

                if (snapshot.empty) {
                    container.innerHTML = '<div class="item-sub">Пока нет баннеров в этом районе</div>';
                    return;
                }

                container.innerHTML = '';
                snapshot.forEach((doc) => {
                    const s = doc.data();
                    sponsoredCache[doc.id] = s;
                    const activeUntilDate = s.activeUntil && s.activeUntil.toDate ? s.activeUntil.toDate() : null;
                    const isExpired = activeUntilDate && activeUntilDate < new Date();
                    const row = document.createElement('div');
                    row.className = 'item';
                    row.innerHTML = `
<div>
<div class="item-title">${escapeHtml(s.title)}${isExpired ? ' (истёк)' : ''}${s.district === 'all' ? ' 🌍 (все районы)' : ''}</div>
<div class="item-sub">До ${activeUntilDate ? escapeHtml(activeUntilDate.toLocaleString('ru-RU')) : '—'} · кликов: ${s.clickCount || 0}</div>
</div>
<div>
<button class="secondary" onclick="editSponsored('${doc.id}')">Изменить</button>
<button class="danger" onclick="deleteSponsored('${doc.id}')">Удалить</button>
</div>
`;
                    container.appendChild(row);
                });
            } catch (err) {
                renderLoadError(container, 'Не удалось загрузить баннеры: ' + err.message, loadSponsored);
            }
        }

        function editSponsored(id) {
            const s = sponsoredCache[id];
            if (!s) return;
            editingSponsoredId = id;
            document.getElementById('sponsored-title').value = s.title || '';
            document.getElementById('sponsored-image').value = s.imageUrl || '';
            document.getElementById('sponsored-url').value = s.targetUrl || '';
            document.getElementById('sponsored-org-id').value = s.organizationId || '';
            document.getElementById('sponsored-order').value = s.order != null ? s.order : 0;
            document.getElementById('sponsored-all-districts').checked = s.district === 'all';
            if (s.activeUntil && s.activeUntil.toDate) {
                const d = s.activeUntil.toDate();
                const pad = (n) => String(n).padStart(2, '0');
                document.getElementById('sponsored-active-until').value =
                    `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
            }
            document.getElementById('sponsored-submit-btn').textContent = 'Сохранить изменения';
            document.getElementById('sponsored-title').scrollIntoView({ behavior: 'smooth' });

            loadSponsored();
        }

        async function uploadSponsoredImage(btn) {
            const fileInput = document.getElementById('sponsored-image-file');
            const file = fileInput.files[0];
            if (!file) {
                alert('Сначала выберите файл');
                return;
            }
            const originalText = btn ? btn.textContent : null;
            if (btn) { btn.disabled = true; btn.textContent = 'Загрузка...'; }
            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', 'my_preset');
                const response = await fetch('https://api.cloudinary.com/v1_1/agidf3gy/image/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.secure_url) {
                    document.getElementById('sponsored-image').value = data.secure_url;
                    showStatus('Фото загружено');
                    if (btn) btn.textContent = '✓ Загружено';
                } else {
                    alert('Ошибка загрузки: ' + JSON.stringify(data));
                }
            } catch (err) {
                alert('ОШИБКА ЗАГРУЗКИ ФОТО: ' + err.message);
            } finally {
                if (btn) {
                    setTimeout(() => { btn.disabled = false; btn.textContent = originalText; }, 1500);
                }
            }
        }

        let _confirmResolve = null;

        function showConfirmDialog(message, confirmLabel) {
            return new Promise((resolve) => {
                document.getElementById('confirm-message').textContent = message;
                document.getElementById('confirm-confirm-btn').textContent = confirmLabel || 'Удалить';
                document.getElementById('confirm-overlay').classList.add('visible');
                _confirmResolve = (result) => {
                    document.getElementById('confirm-overlay').classList.remove('visible');
                    _confirmResolve = null;
                    resolve(result);
                };
            });
        }

        function updateGalleryCount() {
            const value = document.getElementById('org-gallery').value.trim();
            const count = value ? value.split(',').map((s) => s.trim()).filter(Boolean).length : 0;
            document.getElementById('org-gallery-count').textContent = 'Фото в галерее: ' + count;
        }

        function updateAnnouncementImagesCount() {
            const value = document.getElementById('announcement-images').value.trim();
            const count = value ? value.split(',').map((s) => s.trim()).filter(Boolean).length : 0;
            document.getElementById('announcement-images-count').textContent = 'Фото: ' + count;
        }

        async function uploadAnnouncementImages(btn) {
            const fileInput = document.getElementById('announcement-images-file');
            const files = Array.from(fileInput.files || []);
            if (files.length === 0) {
                alert('Сначала выберите файл (можно сразу несколько)');
                return;
            }
            const originalText = btn ? btn.textContent : null;
            if (btn) { btn.disabled = true; }
            const field = document.getElementById('announcement-images');
            let uploaded = 0;
            let failed = 0;
            for (let i = 0; i < files.length; i++) {
                if (btn) { btn.textContent = `Загрузка ${i + 1} из ${files.length}...`; }
                try {
                    const formData = new FormData();
                    formData.append('file', files[i]);
                    formData.append('upload_preset', 'my_preset');
                    const response = await fetch('https://api.cloudinary.com/v1_1/agidf3gy/image/upload', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    if (data.secure_url) {
                        field.value = field.value.trim()
                            ? field.value.trim() + ', ' + data.secure_url
                            : data.secure_url;
                        updateAnnouncementImagesCount();
                        uploaded++;
                    } else {
                        failed++;
                    }
                } catch (err) {
                    failed++;
                }
            }
            if (failed === 0) {
                showStatus(`Загружено фото: ${uploaded}`);
                if (btn) btn.textContent = `✓ Загружено: ${uploaded}`;
            } else {
                alert(`Загружено: ${uploaded}, не удалось: ${failed}`);
                if (btn) btn.textContent = originalText;
            }
            fileInput.value = '';
            if (btn) {
                setTimeout(() => { btn.disabled = false; btn.textContent = originalText; }, 2000);
            }
        }

        async function withButtonLock(btn, fn) {
            if (btn.disabled) return;
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Сохранение...';
            try {
                await fn();
            } finally {
                btn.disabled = false;
                if (btn.textContent === 'Сохранение...') {
                    btn.textContent = originalText;
                }
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }
    </script>
