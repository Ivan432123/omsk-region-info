<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ОМСКРЕГИОН ИНФО — Админ-панель</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, Roboto, Arial, sans-serif;
            background: #F6F3EC;
            color: #1E2A22;
            margin: 0;
            padding: 16px;
        }

        h1 {
            font-size: 20px;
            margin: 0 0 16px;
        }

        h2 {
            font-size: 16px;
            margin: 24px 0 8px;
            border-top: 1px solid #DEDACD;
            padding-top: 16px;
        }

        .card {
            background: #fff;
            border: 1px solid #DEDACD;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #5A5A4E;
            margin: 10px 0 4px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #DEDACD;
            border-radius: 8px;
            font-size: 15px;
            background: #FAFAF7;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        button {
            background: #1E2A22;
            color: #F6F3EC;
            border: none;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 600;
            margin-top: 12px;
            width: 100%;
        }

        button.secondary {
            background: transparent;
            color: #9C3F2E;
            border: 1px solid #9C3F2E;
        }

        button.danger {
            background: #9C3F2E;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            padding: 10px 0;
            border-bottom: 1px solid #DEDACD;
        }

        .item:last-child {
            border-bottom: none;
        }

        .item-title {
            font-weight: 600;
            font-size: 14px;
        }

        .item-sub {
            font-size: 12px;
            color: #8C8571;
        }

        .item button {
            width: auto;
            margin: 0;
            padding: 6px 10px;
            font-size: 12px;
        }

        #error-msg {
            color: #9C3F2E;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        #status-msg {
            color: #5F7A5F;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        #admin-screen {
            display: none;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .top-bar button {
            width: auto;
            padding: 8px 14px;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <!-- Экран входа -->
    <div id="login-screen">
        <h1>ОМСКРЕГИОН ИНФО — вход</h1>
        <div class="card">
            <label>Email</label>
            <input type="email" id="login-email" autocomplete="username">
            <label>Пароль</label>
            <input type="password" id="login-password" autocomplete="current-password">
            <button onclick="doLogin()">Войти</button>
            <div id="error-msg"></div>
        </div>
    </div>

    <!-- Основной экран -->
    <div id="admin-screen">
        <div class="top-bar">
            <h1>Админ-панель</h1>
            <button onclick="doLogout()">Выйти</button>
        </div>

        <div class="card">
            <label>Район</label>
            <select id="district-select" onchange="onDistrictChange()"></select>
        </div>

        <div id="status-msg"></div>

        <h2>Добавить новость</h2>
        <div class="card">
            <label>Заголовок</label>
            <input type="text" id="news-title">
            <label>Краткое описание (для карточки в списке)</label>
            <textarea id="news-description"></textarea>
            <label>Полный текст</label>
            <textarea id="news-content"></textarea>
            <label>Категория</label>
            <select id="news-category">
                <option value="general">Общее</option>
                <option value="water">Водоснабжение</option>
                <option value="gas">Газоснабжение</option>
                <option value="electricity">Электроснабжение</option>
                <option value="road">Дороги</option>
                <option value="emergency">Экстренное</option>
                <option value="events">Мероприятия</option>
            </select>
            <label>Ссылка на изображение (необязательно)</label>
            <input type="text" id="news-image" placeholder="https://...">
            <button onclick="addNews()">Опубликовать новость</button>
        </div>
        <div class="card" id="news-list"></div>

        <h2>Добавить организацию</h2>
        <div class="card">
            <label>Название</label>
            <input type="text" id="org-name">
            <label>Категория</label>
            <input type="text" id="org-category" placeholder="МФЦ, Больница, Школа...">
            <label>Телефон</label>
            <input type="text" id="org-phone" placeholder="79135551234">
            <label>Адрес</label>
            <input type="text" id="org-address">
            <label>Часы работы</label>
            <input type="text" id="org-hours" placeholder="Пн–Пт: 08:00–17:00">
            <label>Сайт (необязательно)</label>
            <input type="text" id="org-website" placeholder="https://...">
            <label>Описание</label>
            <textarea id="org-description"></textarea>
            <button onclick="addOrganization()">Добавить организацию</button>
        </div>
        <div class="card" id="org-list"></div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script>
        // ЗАМЕНИТЕ значения ниже на конфигурацию вашего Web-приложения из Firebase Console
        const firebaseConfig = {
            apiKey: "AIzaSyCiUChcrSO8Vt46S84TaPhLRLcqIXAJOPs",
            authDomain: "omsk-region-info.firebaseapp.compp.com",
            projectId: "omsk-region-info",
            storageBucket: "omsk-region-info.firebasestorage.app",
            messagingSenderId: "500185933703",
            appId: "1:500185933703:web:8bc71f35db8377235f1522"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentDistrictId = null;

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-screen').style.display = 'block';
                loadDistricts();
            } else {
                document.getElementById('login-screen').style.display = 'block';
                document.getElementById('admin-screen').style.display = 'none';
            }
        });

        function doLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('error-msg');
            errorEl.style.display = 'none';
            auth.signInWithEmailAndPassword(email, password).catch((err) => {
                errorEl.textContent = 'Ошибка входа: неверный email или пароль';
                errorEl.style.display = 'block';
            });
        }

        function doLogout() {
            auth.signOut();
        }

        function showStatus(text) {
            const el = document.getElementById('status-msg');
            el.textContent = text;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        async function loadDistricts() {
            const select = document.getElementById('district-select');
            select.innerHTML = '<option>Загрузка...</option>';
            const snapshot = await db.collection('districts').orderBy('order').get();
            select.innerHTML = '';
            snapshot.forEach((doc) => {
                const opt = document.createElement('option');
                opt.value = doc.id;
                opt.textContent = doc.data().name;
                select.appendChild(opt);
            });
            if (!snapshot.empty) {
                currentDistrictId = snapshot.docs[0].id;
                onDistrictChange();
            }
        }

        function onDistrictChange() {
            currentDistrictId = document.getElementById('district-select').value;
            loadNews();
            loadOrganizations();
        }

        async function addNews() {
            const title = document.getElementById('news-title').value.trim();
            const description = document.getElementById('news-description').value.trim();
            const content = document.getElementById('news-content').value.trim();
            const category = document.getElementById('news-category').value;
            const image = document.getElementById('news-image').value.trim();

            if (!title || !description) {
                alert('Заполните хотя бы заголовок и краткое описание');
                return;
            }

            await db.collection('news').add({
                title, description, content,
                category,
                image: image || null,
                district: currentDistrictId,
                village: null,
                sendPush: false,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            document.getElementById('news-title').value = '';
            document.getElementById('news-description').value = '';
            document.getElementById('news-content').value = '';
            document.getElementById('news-image').value = '';
            showStatus('Новость');}
