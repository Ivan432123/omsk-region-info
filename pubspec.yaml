name: omsk_region_info
description: "ОМСКРЕГИОН ИНФО — информационный сервис для жителей районов Омской области"
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.1.0
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.1.0
  firebase_messaging: ^15.0.1

  # Local persistence (district selection must persist forever)
  shared_preferences: ^2.2.3

  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  http: ^1.2.2

  # Formatting (dates dd.MM.yyyy, phone +7 (XXX) XXX-XX-XX)
  intl: ^0.20.2

  # Contact actions: call, map, website, share
  url_launcher: ^6.3.0
  share_plus: ^9.0.0

  # UX polish
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2

  # Utility
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.10
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/illustrations/
